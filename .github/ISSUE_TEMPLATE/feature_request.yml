name: Feature Request
description: Предложить новую возможность или улучшение
title: "[Feature]: "
labels: ["enhancement"]
body:
  - {type: markdown, attributes: {value: "Спасибо за идею!"}}
  - {type: textarea, id: problem, attributes: {label: "Какую проблему это решает"}, validations: {required: true}}
  - {type: textarea, id: solution, attributes: {label: "Предлагаемое решение", description: "Как вы видите реализацию"}, validations: {required: true}}
  - {type: textarea, id: alternatives, attributes: {label: "Рассматривали ли альтернативы"}, validations: {required: false}}
